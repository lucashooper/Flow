<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/FlowIcon-Main.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#A0522D" />
    
    <!-- Primary Meta Tags -->
    <title>Flow Notes</title>
    <meta name="title" content="Flow Notes - A premium space for thinking, writing & deep focus" />
    <meta name="description" content="Flow is a clean, distraction-free note-taking app designed to help you focus and lock in. Write, organize, and think in one calm space." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://flow-notes.app/" />
    <meta property="og:title" content="Flow Notes - A premium space for thinking, writing & deep focus" />
    <meta property="og:description" content="Flow is a clean, distraction-free note-taking app designed to help you focus and lock in. Write, organize, and think in one calm space." />
    <meta property="og:image" content="https://flow-notes.app/FlowIcon-Main.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://flow-notes.app/" />
    <meta property="twitter:title" content="Flow Notes - A premium space for thinking, writing & deep focus" />
    <meta property="twitter:description" content="Flow is a clean, distraction-free note-taking app designed to help you focus and lock in. Write, organize, and think in one calm space." />
    <meta property="twitter:image" content="https://flow-notes.app/FlowIcon-Main.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for offline support
      if ('serviceWorker' in navigator) {
        console.log('🔍 Service Worker API available');
        window.addEventListener('load', () => {
          console.log('🚀 Attempting to register service worker...');
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('✅ Service Worker registered successfully:', registration);
            })
            .catch((error) => {
              console.error('❌ Service Worker registration failed:', error);
            });
        });
      } else {
        console.warn('⚠️ Service Worker API not available in this browser');
      }
    </script>
  </body>
</html>
